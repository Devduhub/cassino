        body {

            align-items: center;

        /* Fundo Animado de Partículas (CSS Only) */
        .bg-animate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            animation: moveBg 100s linear infinite;
            opacity: 0.3;
        }

        @keyframes moveBg {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        header {
            width: 100%;
            padding: 60px 0;
            text-align: center;
            border-bottom: 3px solid var(--gold);
            box-shadow: 0 10px 50px rgba(255, 215, 0, 0.1);
            background: rgba(0,0,0,0.8);

        }

        .logo {
            font-size: 4rem;
            font-weight: 700;
            color: var(--gold);
            text-shadow: var(--neon-gold);
            margin: 0;
            letter-spacing: 5px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px var(--gold); }
            to { text-shadow: 0 0 20px #fff, 0 0 40px var(--gold), 0 0 60px var(--gold); }
        }

        .warning-18 {
            display: inline-block;
            background-color: var(--red);
            color: white;
            padding: 8px 25px;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 20px;
            box-shadow: 0 0 20px var(--red);
            animation: pulse 1.5s infinite;
            font-size: 1.2rem;
            border: 2px solid white;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 10px var(--red); }
            50% { transform: scale(1.1); box-shadow: 0 0 30px var(--red); }
            100% { transform: scale(1); box-shadow: 0 0 10px var(--red); }
        }

        .container {
            max-width: 1300px;
            padding: 60px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            width: 100%;
        }

        .game-card {
            background: linear-gradient(145deg, #151515, #000);
            border: 2px solid #222;
            border-radius: 25px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            text-decoration: none;
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .game-card:hover {
            transform: scale(1.05);
            border-color: var(--gold);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
        }

        .game-thumb {
            width: 100%;
            height: 250px;
            background-size: cover;
            background-position: center;
            filter: grayscale(20%);
            transition: 0.3s;
        }

        .game-card:hover .game-thumb {
            filter: grayscale(0%);
        }

        .game-info {
            padding: 25px;
            text-align: center;
            background: rgba(255,215,0,0.05);
        }

        .game-info h3 {
            margin: 0;
            color: var(--gold);
            font-size: 1.8rem;
            text-transform: uppercase;
        }

        .btn-play {
            display: inline-block;
            margin-top: 20px;
            background: linear-gradient(90deg, #FFD700, #FFA500);
            color: black;
            padding: 12px 40px;
            border-radius: 50px;
            font-weight: 900;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }

        footer {
            background: #000;
            padding: 50px;
            text-align: center;
            border-top: 2px solid var(--gold);
            width: 100%;
            box-sizing: border-box;
        }

        .system-status {
            color: #00ff00;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: #00ff00;
            border-radius: 50%;
            box-shadow: 0 0 15px #00ff00;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
